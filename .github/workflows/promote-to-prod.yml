name: Promote to Prod

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: promote-to-prod
  cancel-in-progress: false

jobs:
  promote:
    if: github.repository == 'team-telnyx/telnyx-python-staging'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout staging
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SDK_WRITE_TOKEN }}

      - name: Read Release-As version from staging history
        id: version
        env:
          GH_TOKEN: ${{ secrets.SDK_WRITE_TOKEN }}
        run: |
          set -euo pipefail
          VERSION=""

          # Primary: read the current released version from PROD master's manifest.
          PROD_MANIFEST=$(gh api "repos/team-telnyx/telnyx-python/contents/.release-please-manifest.json?ref=master" --jq '.content' 2>/dev/null | base64 -d 2>/dev/null || true)
          CUR=$(echo "$PROD_MANIFEST" | jq -r '.["."] // empty' 2>/dev/null || true)
          if [ -n "$CUR" ] && printf '%s' "$CUR" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            VERSION=$(printf '%s' "$CUR" | awk -F. '{printf "%d.%d.0", $1, $2+1}')
            echo "Read prod master manifest: $CUR → next (minor bump) $VERSION"
          fi

          # Fallback: read Release-As from staging history (last 50 commits)
          if [ -z "$VERSION" ]; then
            for commit in $(git rev-list HEAD --max-count=50); do
              BODY=$(git log -1 --format=%b "$commit")
              RA=$(echo "$BODY" | grep -oP 'Release-As:\s*\K[\d.]+' || true)
              if [ -n "$RA" ]; then
                VERSION="$RA"
                break
              fi
            done
            [ -n "$VERSION" ] && echo "Fallback: read Release-As from staging history: $VERSION"
          fi

          # Fallback: read from staging manifest
          if [ -z "$VERSION" ]; then
            VERSION=$(jq -r '.["."] // empty' .release-please-manifest.json 2>/dev/null || true)
            [ -n "$VERSION" ] && echo "Fallback: read from staging manifest: $VERSION"
          fi

          # Fallback: read from _version.py
          if [ -z "$VERSION" ]; then
            VERSION=$(grep -oP '__version__\s*=\s*"\K[\d.]+' src/telnyx/_version.py 2>/dev/null || true)
            [ -n "$VERSION" ] && echo "Fallback: read from _version.py: $VERSION"
          fi

          if [ -z "$VERSION" ]; then
            echo "::warning::Could not determine version; skipping promote"
            echo "has_version=false" >> "$GITHUB_OUTPUT"
          else
            # Check against prod master's already-released version.
            # If staging Release-As <= prod released version, auto-bump patch
            # so release-please creates a new release PR instead of skipping.
            PROD_VERSION=$(gh api "repos/team-telnyx/telnyx-python/contents/.release-please-manifest.json" \
              --jq '.content' 2>/dev/null | base64 -d 2>/dev/null | jq -r '.["."] // empty' 2>/dev/null || true)
            if [ -n "$PROD_VERSION" ]; then
              HIGHER=$(printf '%s\n%s\n' "$VERSION" "$PROD_VERSION" | sort -V | tail -1)
              if [ "$VERSION" = "$PROD_VERSION" ] || [ "$HIGHER" = "$PROD_VERSION" ]; then
                MAJOR=$(echo "$PROD_VERSION" | cut -d. -f1)
                MINOR=$(echo "$PROD_VERSION" | cut -d. -f2)
                PATCH=$(echo "$PROD_VERSION" | cut -d. -f3)
                PATCH=$((PATCH + 1))
                VERSION="${MAJOR}.${MINOR}.${PATCH}"
                echo "::warning::Release-As <= prod ${PROD_VERSION}, auto-bumped to ${VERSION}"
              fi
            fi
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "has_version=true" >> "$GITHUB_OUTPUT"
            echo "Next version: $VERSION"
          fi

      - name: Clone prod repo
        if: steps.version.outputs.has_version == 'true'
        env:
          GH_TOKEN: ${{ secrets.SDK_WRITE_TOKEN }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/team-telnyx/telnyx-python.git prod-repo
          cd prod-repo
          git checkout next
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync staging tree to prod next
        if: steps.version.outputs.has_version == 'true'
        working-directory: prod-repo
        run: |
          git rm -rf . 2>/dev/null || true
          rsync -a --exclude='.git' --exclude='prod-repo' "$GITHUB_WORKSPACE/" .

          git fetch origin master:refs/remotes/origin/master 2>/dev/null || true

          git checkout origin/master -- \
            .github/workflows/release-please.yml \
            .github/workflows/ci.yml \
            .github/workflows/publish-pypi.yml \
            .github/workflows/release-doctor.yml \
            release-please-config.json \
            .release-please-manifest.json \
            2>/dev/null || true

      - name: Commit and push to prod next
        if: steps.version.outputs.has_version == 'true'
        working-directory: prod-repo
        env:
          NEXT_VERSION: ${{ steps.version.outputs.version }}
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to promote"
            exit 0
          fi

          git commit -m "chore: promote from staging ${GITHUB_SHA:0:7}" -m "Release-As: ${NEXT_VERSION}"
          git push origin next

          echo "Promoted to prod next with Release-As: ${NEXT_VERSION}"
