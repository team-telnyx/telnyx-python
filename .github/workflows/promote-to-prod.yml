name: Promote to Prod

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: promote-to-prod
  cancel-in-progress: false

jobs:
  promote:
    if: github.repository == 'team-telnyx/telnyx-python-staging'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout staging
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SDK_WRITE_TOKEN }}

      - name: Read Release-As version from staging history
        id: version
        run: |
          VERSION=""
          for commit in $(git rev-list HEAD --max-count=50); do
            BODY=$(git log -1 --format=%b "$commit")
            RA=$(echo "$BODY" | grep -oP 'Release-As:\s*\K[\d.]+' || true)
            if [ -n "$RA" ]; then
              VERSION="$RA"
              break
            fi
          done

          if [ -z "$VERSION" ]; then
            VERSION=$(jq -r '.["." ] // empty' .release-please-manifest.json 2>/dev/null || true)
          fi

          if [ -z "$VERSION" ]; then
            VERSION=$(grep -oP '__version__\s*=\s*"\K[\d.]+' src/telnyx/_version.py 2>/dev/null || true)
          fi

          if [ -z "$VERSION" ]; then
            echo "::warning::Could not determine version; skipping promote"
            echo "has_version=false" >> "$GITHUB_OUTPUT"
          else
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "has_version=true" >> "$GITHUB_OUTPUT"
            echo "Next version: $VERSION"
          fi

      - name: Clone prod repo
        if: steps.version.outputs.has_version == 'true'
        env:
          GH_TOKEN: ${{ secrets.SDK_WRITE_TOKEN }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/team-telnyx/telnyx-python.git prod-repo
          cd prod-repo
          git checkout next
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync staging tree to prod next
        if: steps.version.outputs.has_version == 'true'
        working-directory: prod-repo
        run: |
          git rm -rf . 2>/dev/null || true
          rsync -a --exclude='.git' --exclude='prod-repo' "$GITHUB_WORKSPACE/" .

          git fetch origin master:refs/remotes/origin/master 2>/dev/null || true

          git checkout origin/master -- \
            .github/workflows/release-please.yml \
            .github/workflows/ci.yml \
            .github/workflows/publish-pypi.yml \
            .github/workflows/release-doctor.yml \
            release-please-config.json \
            .release-please-manifest.json \
            2>/dev/null || true

      - name: Commit and push to prod next
        if: steps.version.outputs.has_version == 'true'
        working-directory: prod-repo
        env:
          NEXT_VERSION: ${{ steps.version.outputs.version }}
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to promote"
            exit 0
          fi

          git commit -m "chore: promote from staging ${GITHUB_SHA:0:7}" -m "Release-As: ${NEXT_VERSION}"
          git push origin next

          echo "Promoted to prod next with Release-As: ${NEXT_VERSION}"
